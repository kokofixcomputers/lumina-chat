name: Build macOS Tauri App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'
        
    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: latest
        
    - name: Install dependencies
      run: pnpm install
      
    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: aarch64-apple-darwin, x86_64-apple-darwin
        
    - name: Setup Tauri CLI
      run: cargo install tauri-cli --version "^2.0"
      
    - name: Build Tauri app
      run: npx tauri build
      
    - name: Find DMG file
      id: find-dmg
      run: |
        DMG_PATH=$(find src-tauri/target/release/bundle/dmg -name "*.dmg" | head -n 1)
        echo "dmg_path=$DMG_PATH" >> $GITHUB_OUTPUT
        echo "Found DMG: $DMG_PATH"
        
    - name: Create zip archive
      run: |
        cd src-tauri/target/release/bundle/dmg
        zip -r Lumina-Chat-macos.zip *.dmg
        
    - name: Upload DMG as artifact
      uses: actions/upload-artifact@v4
      with:
        name: lumina-chat-macos-dmg
        path: src-tauri/target/release/bundle/dmg/Lumina-Chat-macos.zip
        retention-days: 30
        
    - name: Upload raw DMG as artifact
      uses: actions/upload-artifact@v4
      with:
        name: lumina-chat-macos-raw
        path: ${{ steps.find-dmg.outputs.dmg_path }}
        retention-days: 30
