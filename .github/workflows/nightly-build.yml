name: Nightly Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.rust_target }}

      - name: Find and zip binaries (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd src-tauri/target/${{ matrix.rust_target }}/release
          ZIP_NAME="Lumina-Chat-${{ matrix.os }}.zip"

          DMG_FILES=$(find bundle -type f -name "*.dmg" 2>/dev/null)

          if [ -z "$DMG_FILES" ]; then
            echo "No DMG found, zipping release dir"
            zip -r "$ZIP_NAME" .
          else
            echo "Found DMGs:"
            echo "$DMG_FILES"
            while IFS= read -r file; do
              zip -r "$ZIP_NAME" "$file"
            done <<< "$DMG_FILES"
          fi

          echo "Created: $ZIP_NAME"
          ls -la *.zip

      - name: Find and zip binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd src-tauri/target/${{ matrix.rust_target }}/release
          $ZIP_NAME = "Lumina-Chat-${{ matrix.os }}.zip"

          $BINARY_FILES = Get-ChildItem -Recurse -Include *.exe,*.msi

          if ($BINARY_FILES.Count -eq 0) {
            Write-Host "No binaries found, zipping release dir"
            Compress-Archive -Path * -DestinationPath $ZIP_NAME -Force
          } else {
            Write-Host "Found binaries: $($BINARY_FILES.FullName -join ', ')"
            Compress-Archive -Path $BINARY_FILES.FullName -DestinationPath $ZIP_NAME -Force
          }

          Write-Host "Created: $ZIP_NAME"
          Get-ChildItem -Name *.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-chat-${{ matrix.os }}-nightly
          path: src-tauri/target/${{ matrix.rust_target }}/release/Lumina-Chat-${{ matrix.os }}.zip
          retention-days: 7