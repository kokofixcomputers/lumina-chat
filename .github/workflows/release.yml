name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
          - os: windows-latest
            rust_target: x86_64-pc-windows-msvc
          - os: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Update package.json version from release tag
        shell: bash
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          node -e "
            const fs = require('fs');
            const path = 'package.json';
            const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync(path, JSON.stringify(pkg, null, 2) + '\n');
          "
        env:
          VERSION: ${{ github.event.release.tag_name }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: true

      - name: Install Tauri system dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        run: pnpm tauri build --target ${{ matrix.rust_target }}
        env:
          VITE_ONEDRIVE_CLIENT_ID: ${{ secrets.VITE_ONEDRIVE_CLIENT_ID }}
          VITE_ONEDRIVE_CLIENT_SECRET: ${{ secrets.VITE_ONEDRIVE_CLIENT_SECRET }}

      - name: Find and zip binaries (macOS)
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          cd src-tauri/target/${{ matrix.rust_target }}/release
          ZIP_NAME="Lumina-Chat-${{ matrix.os }}.zip"

          DMG_FILES=$(find bundle -type f -name "*.dmg" 2>/dev/null)

          if [ -z "$DMG_FILES" ]; then
            echo "No DMG found, zipping release dir"
            zip -r "$ZIP_NAME" .
          else
            echo "Found DMGs:"
            echo "$DMG_FILES"
            while IFS= read -r file; do
              zip -r "$ZIP_NAME" "$file"
            done <<< "$DMG_FILES"
          fi

          echo "Created: $ZIP_NAME"
          ls -la *.zip

      - name: Find and zip binaries (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd src-tauri/target/${{ matrix.rust_target }}/release
          $ZIP_NAME = "Lumina-Chat-${{ matrix.os }}.zip"
          $BINARY_FILES = Get-ChildItem -Recurse -Include *.exe,*.msi

          if ($BINARY_FILES.Count -eq 0) {
            Write-Host "No binaries found, zipping release dir"
            Compress-Archive -Path * -DestinationPath $ZIP_NAME -Force
          } else {
            Write-Host "Found binaries: $($BINARY_FILES.FullName -join ', ')"
            Compress-Archive -Path $BINARY_FILES.FullName -DestinationPath $ZIP_NAME -Force
          }

      - name: Find and zip binaries (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          cd src-tauri/target/${{ matrix.rust_target }}/release
          ZIP_NAME="Lumina-Chat-${{ matrix.os }}.zip"

          DEB_FILES=$(find bundle -type f -name "*.deb" 2>/dev/null)
          APPIMAGE_FILES=$(find bundle -type f -name "*.AppImage" 2>/dev/null)
          ALL_FILES="$DEB_FILES"$'\n'"$APPIMAGE_FILES"
          ALL_FILES=$(echo "$ALL_FILES" | sed '/^$/d')

          if [ -z "$ALL_FILES" ]; then
            echo "No packages found, zipping release dir"
            zip -r "$ZIP_NAME" .
          else
            echo "Found packages:"
            echo "$ALL_FILES"
            while IFS= read -r file; do
              zip -r "$ZIP_NAME" "$file"
            done <<< "$ALL_FILES"
          fi

          echo "Created: $ZIP_NAME"
          ls -la *.zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumina-chat-${{ matrix.os }}-release
          path: src-tauri/target/${{ matrix.rust_target }}/release/Lumina-Chat-${{ matrix.os }}.zip
          retention-days: 30

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/${{ matrix.rust_target }}/release/Lumina-Chat-${{ matrix.os }}.zip
