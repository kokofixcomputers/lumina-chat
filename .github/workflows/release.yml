name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions: 
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            rust_target: aarch64-apple-darwin
          - os: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install pnpm
      uses: pnpm/action-setup@v2
      with:
        version: latest

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install dependencies
      run: pnpm install

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.rust_target }}

    - name: Setup Tauri CLI
      run: cargo install tauri-cli --version "^2.0"

    - name: Set Tauri target (macOS ARM64)
      if: matrix.os == 'macos-latest'
      run: echo "TAURI_ARCH=aarch64-apple-darwin" >> $GITHUB_ENV

    - name: Build Tauri app
      run: npx tauri build

    - name: Find and zip binaries (macOS)
      if: matrix.os == 'macos-latest'
      shell: bash
      run: |
        cd src-tauri/target/release
        ZIP_NAME="Lumina-Chat-${{ matrix.os }}.zip"

        # Search for any .dmg files (handles spaces)
        shopt -s nullglob
        DMG_FILES=(bundle/dmg/*/*.dmg bundle/*/*.dmg bundle/**/*.dmg)
        if [ ${#DMG_FILES[@]} -eq 0 ]; then
          echo "No DMG found, zipping release dir"
          zip -r "$ZIP_NAME" .
        else
          echo "Found DMGs: ${DMG_FILES[*]}"
          zip -r "$ZIP_NAME" "${DMG_FILES[@]}"
        fi

        echo "zip_path=$ZIP_NAME" >> $GITHUB_OUTPUT
        echo "Created: $ZIP_NAME"
        ls -la *.zip

    - name: Find and zip binaries (Windows)
      if: matrix.os == 'windows-latest'
      shell: pwsh
      run: |
        cd src-tauri/target/release
        $ZIP_NAME = "Lumina-Chat-${{ matrix.os }}.zip"

        # Search for Windows binaries recursively
        $BINARY_FILES = Get-ChildItem -Recurse -Include *.exe,*.msi

        if ($BINARY_FILES.Count -eq 0) {
          Write-Host "No binaries found, zipping release dir"
          Compress-Archive -Path * -DestinationPath $ZIP_NAME
        } else {
          Write-Host "Found binaries: $($BINARY_FILES.FullName -join ', ')"
          Compress-Archive -Path $BINARY_FILES -DestinationPath $ZIP_NAME
        }

        echo "zip_path=$ZIP_NAME" >> $env:GITHUB_OUTPUT
        Write-Host "Created: $ZIP_NAME"
        Get-ChildItem -Name *.zip

    - name: Upload zip artifact
      uses: actions/upload-artifact@v4
      with:
        name: lumina-chat-${{ matrix.os }}-release
        path: src-tauri/target/release/Lumina-Chat-${{ matrix.os }}.zip
        retention-days: 30

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      with:
        files: src-tauri/target/release/Lumina-Chat-${{ matrix.os }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
